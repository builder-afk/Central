version: "3.9"

services:
  # ─── FastAPI Application ───
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://costengine:costengine@db:5432/cost_engine
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - DEBUG=true
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./ml:/app/ml
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ─── PostgreSQL Database ───
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: costengine
      POSTGRES_PASSWORD: costengine
      POSTGRES_DB: cost_engine
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U costengine"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Redis (Cache + Celery Broker) ───
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Celery Worker (Async Tasks) ───
  worker:
    build: .
    environment:
      - DATABASE_URL=postgresql://costengine:costengine@db:5432/cost_engine
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./ml:/app/ml
    command: celery -A app.main:celery_app worker --loglevel=info

volumes:
  pgdata:
